- hosts: ohserver
  vars:
    srcdir: "/mnt/c/Users/{{ lookup('env','USER' )}}/OneDrive/dev/tackley/enphase_integration"
    destdir: ~/src/enphase
    datadir: ~/data/energy
  tasks:
  - name: Copy files
    copy: src={{ item.src }} dest={{ item.dest }} mode={{ item.mode }}
    with_items:
    - {src: '{{srcdir}}/enphase.sh', dest: '{{destdir}}/', mode: '754', backup: yes }
    - {src: '{{srcdir}}/getEnphaseData.py', dest: '{{destdir}}/', mode: '644', backup: yes }
    - {src: '{{srcdir}}/config.json', dest: '{{destdir}}/', mode: '644', backup: yes }
